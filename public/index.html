<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OSCOM Distribution Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

  <div class="bg-white w-96 h-[500px] shadow-lg rounded-xl flex flex-col">

    <!-- header -->
    <div class="bg-blue-600 text-white p-4 rounded-t-xl">
      <h2 class="text-lg font-semibold">OSCOM Distribution Assistant</h2>
    </div>

    <!-- chat area -->
    <div id="chat" class="flex-1 p-4 overflow-y-auto space-y-2"></div>

    <!-- input -->
    <div class="p-3 border-t flex">
      <input id="userInput" type="text" placeholder="How can I help?"  class="flex-1 border rounded-lg p-2"/>
      <button onclick="handleInput()" class="ml-2 bg-blue-600 text-white px-4 rounded-lg"> Send </button>
    </div>

    <!-- file -->
    <input type="file" id="fileUpload" class="hidden"/>

  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>

</body>
</html>
